services:
  planner:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - planner-data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/planner.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  planner-data:
